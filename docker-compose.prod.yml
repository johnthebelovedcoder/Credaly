# Docker Compose — Production environment.
# Uses PostgreSQL, Redis, and all services with proper security.

services:
  # ── PostgreSQL Database ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credaly}
      POSTGRES_USER: ${POSTGRES_USER:-credaly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credaly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - credaly-network

  # ── Redis (feature store + caching + rate limiting + Celery) ──────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - credaly-network

  # ── Scoring API (Python FastAPI) ───────────────────────────────────
  scoring-api:
    build:
      context: ./services/scoring-api
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-credaly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-credaly}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY:?HMAC_SECRET_KEY is required}
      CONSENT_SIGNING_SECRET: ${CONSENT_SIGNING_SECRET:?CONSENT_SIGNING_SECRET is required}
      BVN_ENCRYPTION_KEY: ${BVN_ENCRYPTION_KEY:?BVN_ENCRYPTION_KEY is required}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # Bureau API credentials (set in production)
      CRC_API_URL: ${CRC_API_URL:-}
      CRC_API_KEY: ${CRC_API_KEY:-}
      FIRSTCENTRAL_API_URL: ${FIRSTCENTRAL_API_URL:-}
      FIRSTCENTRAL_API_KEY: ${FIRSTCENTRAL_API_KEY:-}
      CREDITREGISTRY_API_URL: ${CREDITREGISTRY_API_URL:-}
      CREDITREGISTRY_API_KEY: ${CREDITREGISTRY_API_KEY:-}
    volumes:
      - scoring_api_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        max_attempts: 3
    restart: unless-stopped
    networks:
      - credaly-network

  # ── Celery Worker (async batch scoring) ────────────────────────────
  celery-worker:
    build:
      context: ./services/scoring-api
      dockerfile: Dockerfile
      target: production
    command: celery -A src.services.batch_scoring worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-credaly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-credaly}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY}
      CONSENT_SIGNING_SECRET: ${CONSENT_SIGNING_SECRET}
      BVN_ENCRYPTION_KEY: ${BVN_ENCRYPTION_KEY}
      ENVIRONMENT: production
    volumes:
      - scoring_api_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
      restart_policy:
        condition: on-failure
        max_attempts: 3
    restart: unless-stopped
    networks:
      - credaly-network

  # ── Celery Beat (scheduled jobs — retention, consent expiry, SLA) ─
  celery-beat:
    build:
      context: ./services/scoring-api
      dockerfile: Dockerfile
      target: production
    command: celery -A src.services.batch_scoring beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-credaly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-credaly}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY}
      CONSENT_SIGNING_SECRET: ${CONSENT_SIGNING_SECRET}
      BVN_ENCRYPTION_KEY: ${BVN_ENCRYPTION_KEY}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - credaly-network

  # ── Admin API (NestJS TypeScript) ──────────────────────────────────
  admin-api:
    build:
      context: ./services/admin-api
      dockerfile: Dockerfile
      target: production
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-credaly}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-credaly}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      scoring-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3
    restart: unless-stopped
    networks:
      - credaly-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  scoring_api_models:
    driver: local

networks:
  credaly-network:
    driver: bridge
