"""
GitHub Actions CI/CD pipeline — build, test, lint, security scan, and deploy.
"""

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'

jobs:
  # ── Python Scoring API ────────────────────────────────────────────
  test-python:
    name: Test Python Scoring API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/scoring-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/scoring-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov ruff

      - name: Set up test .env
        run: |
          cp .env.example .env
          sed -i 's/change-me-to-a-cryptographically-random-string/test-secret-key-for-ci/g' .env

      - name: Lint with Ruff
        run: ruff check src/ --exit-zero

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: services/scoring-api/coverage.xml
          flags: scoring-api
          fail_ci_if_error: false

  # ── TypeScript Admin API ──────────────────────────────────────────
  test-typescript:
    name: Test TypeScript Admin API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/admin-api/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=cobertura

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: services/admin-api/coverage/cobertura-coverage.xml
          flags: admin-api
          fail_ci_if_error: false

      - name: Build
        run: npm run build

  # ── Security Scan ──────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit (Python security linter)
        working-directory: services/scoring-api
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ --exit-zero

      - name: Run npm audit
        working-directory: services/admin-api
        run: npm audit --audit-level=moderate || true

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          # Check for common secret patterns in non-example env files
          if grep -r "dev-jwt-secret\|dev-hmac-secret\|dev-consent" --include="*.py" --include="*.ts" --include="*.env" --exclude="*.example" .; then
            echo "::warning::Potential hardcoded secrets detected"
          else
            echo "No hardcoded secrets detected"
          fi

  # ── Docker Build (both services) ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build scoring API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/scoring-api
          push: false
          load: true
          tags: credaly/scoring-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/admin-api
          push: false
          load: true
          tags: credaly/admin-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout vulnerability scan
        uses: docker/scout-action@v1
        with:
          command: cves
          only-severities: critical,high
          exit-code: false

  # ── Deploy to Staging (main branch only) ──────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > kubeconfig.yml

      - name: Deploy via ArgoCD
        run: |
          echo "Deploying to staging via ArgoCD GitOps sync"
          echo "In production: push K8s manifests to deploy repo"
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging-api.credaly.io/health
          # curl -f https://staging-admin.credaly.io/admin/health

  # ── Deploy to Production (manual approval required) ────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.credaly.io/health

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via ArgoCD
        run: |
          echo "Deploying to production via ArgoCD GitOps sync"
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER_PROD }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN_PROD }}

      - name: Smoke test production
        run: |
          echo "Running smoke tests against production..."
          # curl -f https://api.credaly.io/health
          # curl -f https://admin.credaly.io/admin/health

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment successful"
          # Send to Slack/PagerDuty/etc.
