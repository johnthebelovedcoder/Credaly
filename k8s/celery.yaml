# Celery Worker & Beat — Kubernetes Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: credaly
  labels:
    app: celery-worker
    component: batch-scoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
        component: batch-scoring
    spec:
      serviceAccountName: celery-worker
      containers:
        - name: celery-worker
          image: credaly/scoring-api:latest
          command: ["celery"]
          args:
            - "-A"
            - "src.services.batch_scoring"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=4"
          envFrom:
            - secretRef:
                name: scoring-api-secrets
            - configMapRef:
                name: scoring-api-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: models
              mountPath: /app/models
          livenessProbe:
            exec:
              command:
                - celery
                - "-A"
                - "src.services.batch_scoring"
                - "inspect"
                - "ping"
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - celery
                - "-A"
                - "src.services.batch_scoring"
                - "inspect"
                - "ping"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: scoring-api-models
      terminationGracePeriodSeconds: 60

---
# Celery Beat — scheduled tasks (retention purge, consent expiry, SLA checks)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: credaly
  labels:
    app: celery-beat
    component: scheduler
spec:
  replicas: 1  # MUST be exactly 1 to avoid duplicate scheduled tasks
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
        component: scheduler
    spec:
      serviceAccountName: celery-beat
      containers:
        - name: celery-beat
          image: credaly/scoring-api:latest
          command: ["celery"]
          args:
            - "-A"
            - "src.services.batch_scoring"
            - "beat"
            - "--loglevel=info"
            - "--schedule=/tmp/celerybeat-schedule"
          envFrom:
            - secretRef:
                name: scoring-api-secrets
            - configMapRef:
                name: scoring-api-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - celery
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: celery-worker
  namespace: credaly

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: celery-beat
  namespace: credaly
