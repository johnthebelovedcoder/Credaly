# Scoring API — Secrets Template
# IMPORTANT: Replace all placeholder values with actual secrets before deploying.
# Use: kubectl create secret generic scoring-api-secrets --from-literal=KEY=VALUE -n credaly
---
apiVersion: v1
kind: Secret
metadata:
  name: scoring-api-secrets
  namespace: credaly
type: Opaque
stringData:
  # Database
  POSTGRES_USER: credaly
  POSTGRES_PASSWORD: CHANGE_ME_USE_A_STRONG_RANDOM_PASSWORD
  POSTGRES_DB: credaly

  # Application secrets
  HMAC_SECRET_KEY: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_64
  CONSENT_SIGNING_SECRET: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_64
  BVN_ENCRYPTION_KEY: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32

  # Bureau API credentials (Phase 1)
  CRC_API_URL: ""
  CRC_API_KEY: ""
  FIRSTCENTRAL_API_URL: ""
  FIRSTCENTRAL_API_KEY: ""
  CREDITREGISTRY_API_URL: ""
  CREDITREGISTRY_API_KEY: ""

  # Redis
  REDIS_PASSWORD: CHANGE_ME_USE_A_STRONG_RANDOM_PASSWORD

---
# Admin API — Secrets Template
apiVersion: v1
kind: Secret
metadata:
  name: admin-api-secrets
  namespace: credaly
type: Opaque
stringData:
  # Database
  DB_USERNAME: credaly
  DB_PASSWORD: CHANGE_ME_USE_A_STRONG_RANDOM_PASSWORD
  DB_NAME: credaly

  # JWT Authentication
  JWT_SECRET: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_64
  JWT_REFRESH_SECRET: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_64
