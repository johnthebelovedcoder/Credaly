# Scoring API — ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scoring-api-config
  namespace: credaly
data:
  ENVIRONMENT: production
  DEBUG: "false"
  CORS_ALLOWED_ORIGINS: "https://admin.credaly.io"

  # Database connection
  DATABASE_URL: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)

  # Redis connection
  REDIS_URL: redis://:$(REDIS_PASSWORD)@redis:6379/0

  # ML Model
  MODEL_REGISTRY_URI: ./mlruns
  MODEL_ARTIFACTS_PATH: ./models
  MIN_DATA_COVERAGE_PCT: "30.0"

  # Scoring
  SCORE_MIN: "300"
  SCORE_MAX: "850"
  CONFIDENCE_LEVEL: "0.95"

  # Rate Limiting
  DEFAULT_RATE_LIMIT_PER_MINUTE: "100"

  # Data Retention (months)
  RAW_TRANSACTION_RETENTION_MONTHS: "24"
  DERIVED_FEATURE_RETENTION_MONTHS: "36"
  AUDIT_LOG_RETENTION_YEARS: "7"

  # Webhook
  WEBHOOK_TIMEOUT_SECONDS: "10"
  WEBHOOK_MAX_RETRIES: "3"
  WEBHOOK_RETRY_BACKOFF_SECONDS: "30"

  # Score Cache TTL
  SCORE_CACHE_TTL_SECONDS: "86400"

  # Pool settings
  POOL_SIZE: "10"
  MAX_OVERFLOW: "20"
